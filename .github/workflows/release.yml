name: Release build

# Build unsigned Windows + macOS installers whenever a vX.Y.Z tag is pushed,
# and attach them to a published GitHub Release named for the tag.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# The builds are unsigned: no Apple/Windows signing secrets are configured, so
# no codesigning or notarization runs. First launch will warn —
#   macOS:   right-click the app -> Open  (Gatekeeper)
#   Windows: More info -> Run anyway       (SmartScreen)

on:
  push:
    tags:
      - "v*"

jobs:
  # 1) Create a DRAFT release up front so the three build runners have a single,
  #    already-existing target to upload to (avoids the race of three jobs each
  #    trying to create the release for the same tag).
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: `Meridian ${process.env.TAG}`,
              body: [
                "Unsigned builds.",
                "",
                "- **macOS** (`aarch64` = Apple Silicon, `x64` = Intel): the first launch is blocked by Gatekeeper. Right-click the app and choose **Open**, then confirm.",
                "- **Windows**: SmartScreen may warn on first run. Choose **More info → Run anyway**.",
              ].join("\n"),
              draft: true,
              prerelease: false,
            });
            return data.id;

  # 2) Build on each platform and upload the installers to the draft release.
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux build needs the WebKitGTK / GTK / AppIndicator dev
      # headers and patchelf (for the AppImage). 22.04 ships webkit2gtk-4.1 and
      # links an older glibc, so the AppImage runs on a wider range of distros.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Must run after Node is on PATH; writes the tag's version into
      # tauri.conf.json / package.json / Cargo.toml for this build only.
      - name: Stamp version from tag
        shell: bash
        run: node scripts/ci-set-version.mjs "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and lets tauri-action generate + upload
          # latest.json. These are the updater's minisign keys (NOT Apple/Windows
          # code-signing) — without them a build with createUpdaterArtifacts
          # fails. Add both as repository secrets before tagging.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # 3) All builds succeeded — flip the draft to a published release.
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });
